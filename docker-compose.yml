services:
  tsp-solver:
    build:
      context: .
      dockerfile: services/api/Dockerfile.python
    container_name: tsp-ptsp-solver-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - GO_WORKER_ENABLED=true
      - GO_WORKER_URL=http://go-worker-random-hc:8080
      - GO_WORKER_URL_RANDOM_HC=http://go-worker-random-hc:8080
      - GO_WORKER_URL_GENETIC=http://go-worker-genetic:8080
      - GO_WORKER_URL_MCTS=http://go-worker-mcts:8080
      - GO_WORKER_TIMEOUT_SECONDS=30
    volumes:
      - ./services/api/app:/app/app
      - ./services/api/analytics:/app/analytics
      - ./media:/app/media
      - ./results:/app/results
    depends_on:
      - go-worker-random-hc
      - go-worker-genetic
      - go-worker-mcts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ptsp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  go-worker-random-hc:
    build:
      context: .
      dockerfile: services/go-worker/go-worker/Dockerfile
    container_name: tsp-go-worker-random-hc
    ports:
      - "8080:8080"
    environment:
      - ALLOWED_METHODS=Random,HC
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  go-worker-genetic:
    build:
      context: .
      dockerfile: services/go-worker/go-worker/Dockerfile
    container_name: tsp-go-worker-genetic
    ports:
      - "8081:8080"
    environment:
      - ALLOWED_METHODS=Genetic
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  go-worker-mcts:
    build:
      context: .
      dockerfile: services/go-worker/go-worker/Dockerfile
    container_name: tsp-go-worker-mcts
    ports:
      - "8082:8080"
    environment:
      - ALLOWED_METHODS=MCTS
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: tsp-ptsp-solver-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_TOOLBAR_MODE=viewer
      - API_BASE_URL=http://tsp-solver:8000
    volumes:
      - ./services/frontend/streamlit_app.py:/app/streamlit_app.py
      - ./services/frontend/helpers:/app/helpers
      - ./media:/app/media
      - ./results:/app/results
    depends_on:
      - tsp-solver
    networks:
      - default

networks:
  default:
    driver: bridge

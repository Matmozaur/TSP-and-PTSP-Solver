services:
  tsp-solver:
    build:
      context: .
      dockerfile: services/api/Dockerfile.python
    container_name: tsp-ptsp-solver-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - GO_WORKER_ENABLED=true
      - GO_WORKER_MODE=strict
      - GO_WORKER_URL=http://go-worker-random-hc:8080
      - GO_WORKER_URL_RANDOM_HC=http://go-worker-random-hc:8080
      - GO_WORKER_URL_GENETIC=http://go-worker-genetic:8080
      - GO_WORKER_URL_MCTS=http://go-worker-mcts:8080
      - GO_WORKER_TIMEOUT_SECONDS=30
      # Observability
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=tsp-solver
      - PROMETHEUS_ENABLED=true
    volumes:
      - ./services/api/app:/app/app
      - ./services/api/analytics:/app/analytics
      - ./media:/app/media
      - ./results:/app/results
    depends_on:
      go-worker-random-hc:
        condition: service_healthy
      go-worker-genetic:
        condition: service_healthy
      go-worker-mcts:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/tsp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  go-worker-random-hc:
    build:
      context: .
      dockerfile: services/go-worker/go-worker/Dockerfile
    container_name: tsp-go-worker-random-hc
    ports:
      - "8080:8080"
    environment:
      - ALLOWED_METHODS=Random,HC
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 2s

  go-worker-genetic:
    build:
      context: .
      dockerfile: services/go-worker/go-worker/Dockerfile
    container_name: tsp-go-worker-genetic
    ports:
      - "8081:8080"
    environment:
      - ALLOWED_METHODS=Genetic
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 2s

  go-worker-mcts:
    build:
      context: .
      dockerfile: services/go-worker/go-worker/Dockerfile
    container_name: tsp-go-worker-mcts
    ports:
      - "8082:8080"
    environment:
      - ALLOWED_METHODS=MCTS
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 2s

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: tsp-ptsp-solver-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_TOOLBAR_MODE=viewer
      - API_BASE_URL=http://tsp-solver:8000
    volumes:
      - ./services/frontend/streamlit_app.py:/app/streamlit_app.py
      - ./services/frontend/helpers:/app/helpers
      - ./media:/app/media
      - ./results:/app/results
    depends_on:
      - tsp-solver

  # --- Observability stack ---

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tsp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    container_name: tsp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: tsp-jaeger
    ports:
      - "16686:16686"       # Jaeger UI
      - "127.0.0.1:4317:4317"  # OTLP gRPC (localhost only)
      - "127.0.0.1:4318:4318"  # OTLP HTTP (localhost only)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  prometheus-data:
  grafana-data:

networks:
  default:
    driver: bridge
